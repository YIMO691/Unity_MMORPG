syntax = "proto3";

package mmorpg;

option csharp_namespace = "AIMMO.Proto";

message RoleInfo {
  string role_id = 1;
  string name = 2;
  int32 level = 3;
  int32 class_id = 4;
  int32 scene_id = 5;
  int64 gold = 6;
}

message C2S_GetRoleListReq {
  string player_id = 1;
  string token = 2;
}

message S2C_GetRoleListRes {
  int32 code = 1;
  string message = 2;
  repeated RoleInfo roles = 3;
}

message C2S_CreateRoleReq {
  string player_id = 1;
  string token = 2;
  string name = 3;
  int32 class_id = 4;
}

message S2C_CreateRoleRes {
  int32 code = 1;
  string message = 2;
  RoleInfo role = 3;
}

message C2S_SelectRoleReq {
  string player_id = 1;
  string token = 2;
  string role_id = 3;
}

message S2C_SelectRoleRes {
  int32 code = 1;
  string message = 2;
  RoleInfo role = 3;
}
