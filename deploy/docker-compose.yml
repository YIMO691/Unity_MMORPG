services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mmorpg
      POSTGRES_USER: mmorpg
      POSTGRES_PASSWORD: mmorpg123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mmorpg"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  gateway:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    ports:
      - "5000:5000"
    environment:
      ConnectionStrings__Postgres: Host=postgres;Database=mmorpg;Username=mmorpg;Password=mmorpg123
      ConnectionStrings__Redis: redis:6379
      USE_POSTGRES: "true"
      USE_REDIS: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
